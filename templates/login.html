<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPM Daily Market System</title>

    <link rel="icon" type="image/png" href="/static/images/spm brand logo.png">

    <link rel="stylesheet" href="/static/css/style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="login-container">

        <div class="logo-section">
            <img src="/static/images/spm brand logo.png" alt="SPM Logo">

            <h1>SPM Daily Market</h1>

            <p>Secure Login Portal</p>
        </div>

        <form id="loginForm">

            <div class="input-group">
                <i class="fas fa-user"></i>
                <input
                    type="text"
                    id="userid"
                    name="userid"
                    placeholder="User ID"
                    autocomplete="username"
                    required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Password"
                    autocomplete="current-password"
                    required>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i>
                Sign In
            </button>

            <div id="error"></div>

        </form>

        <div class="footer">
            © 2026 SPM Daily Market System. All Rights Reserved.
        </div>

    </div>

    <!-- Correct JS Path -->
    <script src="/static/js/login.js"></script>

</body>
</html>
